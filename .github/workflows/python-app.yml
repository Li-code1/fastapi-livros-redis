name: Python Application CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout do Código
    - name: Checkout de codigo
      uses: actions/checkout@v4

    # 2. Instalar Python 
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Instalar o Poetry 
    - name: Instalar Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    # 4. Configurar Cache do Poetry (Boa prática para velocidade)
    - name: Configurar Cache do Poetry
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry
        key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-poetry-

    # 5. Instalar as dependências no ambiente do pipeline
    - name: Instalar dependencias do projeto
      run: poetry install --no-root --no-interaction

    # 6. Rodar os testes com Pytest através do Poetry
    - name: Rodar testes com pytest
      run: poetry run pytest

    # 7. NOVO PASSO: Build da imagem Docker (Objetivo do novo exercício)
    - name: Build Docker image
      run: docker build -t fastapi-app:latest .
